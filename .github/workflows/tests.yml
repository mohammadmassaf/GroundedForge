name: tests

# When to run: on every push and every pull request.
on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest          # a fresh Linux machine, provisioned per run
    steps:
      - uses: actions/checkout@v4    # 1. clone the repo onto the runner

      - uses: actions/setup-python@v5  # 2. install Python
        with:
          python-version: "3.13"

      - name: Install dependencies   # 3. install exactly what a fresh clone would
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests              # 4. the actual gate
        run: pytest -q
